name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with assets
        run: |
          pyinstaller --onefile --windowed --name IDARA_DZ --add-data "assets;assets" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: IDARA_DZ_EXE
          path: dist/IDARA_DZ.exe
