name: Build EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "HAMZA SERVICES" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: HAMZA-SERVICES-EXE
          path: dist/HAMZA SERVICES.exe
